[pytest]
# Tests import the backend modules by bare name (import app, import truth, ...),
# mirroring how the app itself imports them. pythonpath adds backend/ to sys.path.
pythonpath = .
testpaths = tests
addopts = -q
filterwarnings =
    # FastAPI's @app.on_event startup hook is deprecated but still the app's
    # mechanism; don't fail the suite on that library-level warning.
    ignore::DeprecationWarning
