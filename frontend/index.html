<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WLO Quellenerschliessung</title>
  <link rel="stylesheet" href="/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/wissenlebtonline_claim.svg" alt="WissenLebtOnline" class="brand-logo">
      <span class="brand-app">Quellensteckbriefe</span>
    </div>
    <div class="topbar-actions">
      <input id="search" type="search" placeholder="Suche: Name, Fach, Beschreibung…" autocomplete="off">
      <button id="refreshBtn" class="btn-ghost" title="Live-Daten von der WLO-API neu abrufen">🔄 Aktualisieren</button>
      <button id="loginBtn" class="btn-ghost" title="Interner Bereich">🔒 Team-Login</button>
    </div>
  </header>

  <nav class="tabbar">
    <div class="tabs">
      <button class="tab active" data-view="list">📚 Quellen</button>
      <button class="tab" data-view="stats">📊 Statistiken</button>
    </div>
    <div class="tabbar-export">
      <span class="hint" id="freshness" title="Datenstand der zuletzt abgerufenen Live-/Facetten-Daten"></span>
      <span class="hint" id="exportHint"></span>
      <button id="exportCsvAll" class="btn-ghost small">⬇ CSV</button>
      <button id="exportJsonAll" class="btn-ghost small">⬇ JSON</button>
      <button id="exportTablePdf" class="btn-ghost small" title="Aktuelle Filter-Auswahl als Tabellen-PDF">🖨️ Tabelle</button>
      <button id="exportStatsPdf" class="btn-ghost small hidden" title="Statistik-Bericht als PDF">🖨️ Statistik</button>
    </div>
  </nav>

  <!-- Auswahl-Leiste -->
  <div id="selbar" class="selbar hidden">
    <span><b id="selCount">0</b> ausgewählt</span>
    <div class="selbar-actions">
      <button id="selPdf" class="btn small">🖨️ PDF-Steckbriefe</button>
      <select id="pdfTemplate" class="mini-sel" title="PDF-Vorlage wählen">
        <option value="standard">Standard (ausführlich)</option>
        <option value="compact">Kompakt (1 Seite)</option>
      </select>
      <label class="chk"><input id="pdfPreview" type="checkbox" checked> Vorschaubilder</label>
      <label class="chk"><input id="pdfSeparate" type="checkbox"> einzelne Dateien</label>
      <label class="chk"><input id="pdfInternal" type="checkbox"> interne Infos</label>
      <span class="sep">·</span>
      <button id="selCsv" class="btn-ghost small">⬇ CSV</button>
      <button id="selJson" class="btn-ghost small">⬇ JSON</button>
      <button id="selClear" class="btn-ghost small">Auswahl leeren</button>
    </div>
  </div>

  <!-- VIEW: Liste -->
  <main id="view-list" class="layout">
    <aside class="filters">
      <h3>Filter</h3>
      <!-- End-User-Filter; Default = Crawler. Lässt sich mit Fach/Stufe/… kombinieren. -->
      <label>Art der Quelle
        <select id="f-art">
          <option value="" selected>alle Quellen</option>
          <option value="crawler">Quellen mit Crawler</option>
          <option value="node">mit Quelldatensatz</option>
          <option value="bq">mit Bezugsquelle</option>
          <option value="both">Quelldatensatz und Bezugsquelle</option>
        </select>
      </label>
      <!-- Nur nach Team-Login sichtbar (Fehlerkontrolle). -->
      <label class="team-only hidden">Prüfung / Herkunft (Team)
        <select id="f-pruef">
          <option value="">alle</option>
          <option value="wlo">aus Datenübernahme (Migration)</option>
          <option value="legacy">über alte Verschlagwortung gebunden</option>
          <option value="mistyp">Datensatz ohne Typ „Quelle" (mis-getaggt)</option>
          <option value="blacklist">aussortiert (keine echte Quelle)</option>
        </select>
      </label>
      <label>Fach <select id="f-subject"><option value="">alle</option></select></label>
      <label>Bildungsstufe <select id="f-level"><option value="">alle</option></select></label>
      <label>Inhaltstyp <select id="f-lrt"><option value="">alle</option></select></label>
      <label>Lizenz <select id="f-license"><option value="">alle</option></select></label>
      <label>Sprache <select id="f-language"><option value="">alle</option></select></label>
      <label>Mindest-Inhaltszahl: <span id="mc-val">0</span>
        <input id="f-mincount" type="range" min="0" max="100" value="0" step="5">
      </label>
      <label class="chk"><input id="f-oer" type="checkbox"> nur OER</label>
      <label class="chk"><input id="f-fp" type="checkbox"> nur mit Feld-Profil</label>
      <label>Sortierung
        <select id="f-sort">
          <option value="contentCount|desc">Inhalte (viel → wenig)</option>
          <option value="contentCount|asc">Inhalte (wenig → viel)</option>
          <option value="name|asc">Name (A → Z)</option>
          <option value="name|desc">Name (Z → A)</option>
          <option value="fieldActiveCount|desc">aktive Felder (viel → wenig)</option>
        </select>
      </label>
      <button id="resetBtn" class="btn-ghost small">Filter zurücksetzen</button>
      <p class="hint" id="resultCount"></p>
      <div class="statuskey" title="Farbe der Kachel-Pillen (Quelldatensatz / Bezugsquelle / Spider)">
        <span><i class="sk ok"></i> ok</span><span><i class="sk warn"></i> Einschränkung</span><span><i class="sk miss"></i> fehlt</span><span><i class="sk unk"></i> unbekannt</span>
      </div>
      <label class="chk selectall"><input id="selAllPage" type="checkbox"> Seite auswählen</label>
    </aside>

    <section class="results">
      <div id="list" class="cards"></div>
      <div id="pager" class="pager"></div>
    </section>
  </main>

  <!-- VIEW: Statistik -->
  <main id="view-stats" class="stats-view hidden"></main>

  <!-- Detail / Steckbrief -->
  <div id="overlay" class="overlay hidden"><div class="drawer" id="drawer"></div></div>

  <!-- Login-Dialog -->
  <div id="loginOverlay" class="overlay hidden">
    <div class="dialog">
      <h3>Interner Team-Login</h3>
      <p class="hint">Für Entwicklervermerke &amp; genauen Erschließungsstatus.</p>
      <input id="pwInput" type="password" placeholder="Team-Passwort">
      <p id="pwErr" class="err hidden">Falsches Passwort.</p>
      <div class="dialog-actions">
        <button id="pwCancel" class="btn-ghost">Abbrechen</button>
        <button id="pwOk" class="btn">Anmelden</button>
      </div>
    </div>
  </div>

  <!-- geteiltes Karten-Aktionsmenü -->
  <div id="cardmenu" class="cardmenu hidden">
    <button data-act="detail">📋 Steckbrief öffnen</button>
    <button data-act="pdf">🖨️ PDF-Steckbrief</button>
    <button data-act="open">↗ Quelle öffnen</button>
    <button data-act="select">✓ Zur Auswahl</button>
  </div>

  <footer class="appfoot">
    <span class="foot-brand">WissenLebtOnline · Quellensteckbriefe</span>
    <nav class="foot-links">
      <a href="#" data-legal="impressum">Impressum</a>
      <a href="#" data-legal="datenschutz">Datenschutz</a>
      <a href="https://wirlernenonline.de/" target="_blank" rel="noopener">wirlernenonline.de ↗</a>
    </nav>
  </footer>

    <div class="legal-panel">
      <button class="legal-close" id="legalClose" title="Schließen">×</button>
      <div id="legalBody" class="legal-body"></div>
    </div>
  </div>
