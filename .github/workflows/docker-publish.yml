name: Build & Push Docker image

# Baut das Serving-Image und veröffentlicht es auf Docker Hub.
# Voraussetzung: Repository-Secrets DOCKERHUB_USERNAME und DOCKERHUB_TOKEN
# (Docker-Hub-Benutzer + Access-Token). Der Image-Name ist
# <DOCKERHUB_USERNAME>/quellensteckbriefe (bei Bedarf unten anpassen).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Run tests
        run: python -m pytest backend/tests

  docker:
    needs: test
    runs-on: ubuntu-latest
    # Nur veröffentlichen, wenn die Secrets gesetzt sind (z. B. nicht in Forks).
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/quellensteckbriefe
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
